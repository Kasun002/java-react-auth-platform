# ============================================================
# SECURITY NOTE — Do NOT commit real credentials here.
# In production, inject secrets via one of:
#   - HashiCorp Vault + vault-agent sidecar
#   - AWS Secrets Manager + External Secrets Operator
#   - Sealed Secrets (kubeseal) for GitOps
#
# All values are base64-encoded placeholders.
# Replace with:  echo -n 'your-value' | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: shop-platform
  labels:
    app: auth-service
type: Opaque
data:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # echo -n 'jdbc:postgresql://auth-db-service:5432/auth_db' | base64
  SPRING_DATASOURCE_URL: amRiYzpwb3N0Z3Jlc3FsOi8vYXV0aC1kYi1zZXJ2aWNlOjU0MzIvYXV0aF9kYg==
  # echo -n 'changeme' | base64
  SPRING_DATASOURCE_USERNAME: Y2hhbmdlbWU=
  # Replace with a strong production password
  SPRING_DATASOURCE_PASSWORD: Y2hhbmdlbWU=

  # ── JWT signing key (>= 256-bit / 32 chars) ───────────────────────────────────
  # echo -n 'replace-with-a-cryptographically-random-secret-at-least-32-chars' | base64
  JWT_SECRET: cmVwbGFjZS13aXRoLWEtY3J5cHRvZ3JhcGhpY2FsbHktcmFuZG9tLXNlY3JldA==

  # ── Redis (leave empty if Redis has no AUTH configured) ───────────────────────
  # echo -n 'your-redis-password' | base64
  REDIS_PASSWORD: ""

  # ── SMTP ─────────────────────────────────────────────────────────────────────
  # echo -n 'your-smtp-app-password' | base64
  MAIL_PASSWORD: Y2hhbmdlbWU=

  # ── AWS credentials (SQS / SES) ──────────────────────────────────────────────
  # echo -n 'AKIAIOSFODNN7EXAMPLE' | base64
  AWS_ACCESS_KEY_ID: QUtJQUlPU0ZPRE5ON0VYQU1QTEU=
  # echo -n 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY' | base64
  AWS_SECRET_ACCESS_KEY: d0phbHJYVXRuRkVNSS9LN01ERU5HL2JQeFJmaUNZRVhBTVBMRUtFWQ==

  # ── LDAP service account password ────────────────────────────────────────────
  # echo -n 'your-ldap-service-account-password' | base64
  AD_LDAP_PASSWORD: Y2hhbmdlbWU=
