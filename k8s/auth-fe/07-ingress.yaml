# Ingress — terminates TLS and routes external traffic into auth-fe.
# auth-service stays ClusterIP (internal only); auth-fe nginx proxies /api/ to it.
#
# Prerequisites:
#   - nginx Ingress controller deployed in namespace ingress-nginx
#   - cert-manager with a ClusterIssuer named "letsencrypt-prod" (or replace with your issuer)
#
# Replace shop.example.com with your actual domain before deploying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-fe-ingress
  namespace: shop-platform
  labels:
    app: auth-fe
  annotations:
    # ── TLS — cert-manager will provision and renew the certificate ──────────
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ── nginx Ingress controller settings ────────────────────────────────────
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Proxy buffer settings (auth tokens and PKCE params can be large headers)
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"

    # Security: limit request body size
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"

    # Security headers added at the Ingress layer
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shop.example.com           # Replace with your domain
      secretName: auth-fe-tls        # cert-manager will populate this Secret
  rules:
    - host: shop.example.com         # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-fe
                port:
                  number: 8080
