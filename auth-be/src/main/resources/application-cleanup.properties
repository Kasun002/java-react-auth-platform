# ─────────────────────────────────────────────────────────────────────────────
# Spring profile: cleanup
#
# Activated in the Kubernetes CronJob pod via SPRING_PROFILES_ACTIVE=cleanup.
# This profile runs OtpCleanupJob as a one-shot ApplicationRunner and exits.
# The embedded web server, Flyway, and the SQS consumer are all disabled so
# the pod starts fast, does its work, and terminates cleanly.
# ─────────────────────────────────────────────────────────────────────────────

# ── No embedded web server — one-shot batch job, not a long-running service ──
spring.main.web-application-type=none

# ── Flyway disabled — schema migrations are the responsibility of the main ────
# ── auth-service Deployment, not the cleanup CronJob pod.               ────────
spring.flyway.enabled=false

# ── SQS email consumer disabled — cleanup pod has no SQS egress ─────────────
app.messaging.consumer.enabled=false

# ── OTP cleanup retention window ─────────────────────────────────────────────
# Records whose expires_at is older than this many hours are hard-deleted.
# Override per environment via OTP_CLEANUP_RETENTION_HOURS env var in the
# CronJob manifest (k8s/auth/08-cronjob.yaml).
otp.cleanup.retention-hours=${OTP_CLEANUP_RETENTION_HOURS:24}

# ── Logging — concise output suitable for kubectl logs / log aggregation ─────
logging.level.com.shop.auth=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
