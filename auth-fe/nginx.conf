# ============================================================
# nginx configuration for auth-fe (React SPA)
# - Serves static assets from /usr/share/nginx/html
# - SPA fallback: all non-file routes → index.html
# - Proxies /api/ → auth-service (k8s internal DNS)
# - Runs on port 8080 as non-root (uid 101)
# - Compatible with readOnlyRootFilesystem: true
# ============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;

# Write pid to /tmp so non-root + readOnlyRootFilesystem works
pid  /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # ── Temp paths under /tmp (readOnlyRootFilesystem-safe) ──────────────────
    client_body_temp_path  /tmp/nginx/client-body;
    proxy_temp_path        /tmp/nginx/proxy;
    fastcgi_temp_path      /tmp/nginx/fastcgi;
    uwsgi_temp_path        /tmp/nginx/uwsgi;
    scgi_temp_path         /tmp/nginx/scgi;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # ── Hide nginx version (security) ────────────────────────────────────────
    server_tokens off;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip  on;
    gzip_vary  on;
    gzip_min_length  1024;
    gzip_proxied  any;
    gzip_comp_level  6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    server {
        listen       8080;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── Security headers (PCI-DSS / OWASP) ───────────────────────────────
        add_header X-Frame-Options            "DENY"                              always;
        add_header X-Content-Type-Options     "nosniff"                           always;
        add_header X-XSS-Protection           "1; mode=block"                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy         "geolocation=(), microphone=()"     always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline'; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data: https:; \
             font-src 'self' data:; \
             connect-src 'self';"
            always;

        # ── Kubernetes liveness / readiness health endpoint ───────────────────
        location = /health {
            access_log  off;
            return 200  "ok\n";
            add_header  Content-Type text/plain;
        }

        # ── API proxy → auth-service (k8s ClusterIP DNS) ─────────────────────
        # Strips the /api prefix before forwarding.
        # e.g.  GET /api/auth/login  →  http://auth-service:8080/auth/login
        location /api/ {
            proxy_pass         http://auth-service.shop-platform.svc.cluster.local:8080/;
            proxy_http_version 1.1;

            # Pass real client info to the backend
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # ── Static asset cache (Vite outputs content-hashed filenames) ────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # ── SPA fallback — serve index.html for all client-side routes ────────
        location / {
            try_files $uri $uri/ /index.html;

            # index.html must not be cached so the browser always gets the
            # latest entry-point with fresh asset hashes
            location = /index.html {
                add_header  Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
    }
}
