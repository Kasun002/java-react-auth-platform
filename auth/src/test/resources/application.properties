# ── Test application properties ───────────────────────────────────────────────
# This file REPLACES src/main/resources/application.properties during tests.
# All properties required to load the Spring context must be present here.

# ── Database — H2 in-memory (no PostgreSQL needed for tests) ──────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# ── Redis — mocked in AuthApplicationTests via @MockitoBean ───────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=MyVeryLongAndSecureJwtSecretKeyThatIsAtLeast256BitsLongForDevOnly
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── Password policy ───────────────────────────────────────────────────────────
app.security.password.history-count=12
app.security.password.max-age-days=90

# ── Password reset ────────────────────────────────────────────────────────────
app.password-reset.base-url=http://localhost:3000/reset-password
app.password-reset.token-ttl-minutes=15

# ── OTP ───────────────────────────────────────────────────────────────────────
app.otp.expiry-minutes=10
app.otp.max-attempts=3
app.otp.max-resends-per-hour=3

# ── Messaging / AWS (consumer disabled; clients created lazily) ───────────────
app.messaging.consumer.enabled=false
app.messaging.otp-email-queue-url=http://localhost:4566/000000000000/otp-email-queue
app.messaging.ses-sender-email=test@example.com
cloud.aws.region.static=us-east-1
cloud.aws.credentials.access-key=test
cloud.aws.credentials.secret-key=test
cloud.aws.endpoint=http://localhost:4566

# ── Mail — mocked in AuthApplicationTests via @MockitoBean ───────────────────
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Actuator health — disable external-service contributors that require live connections ──
management.health.mail.enabled=false
management.health.redis.enabled=false

# ── Azure AD — disabled in tests (NimbusJwtDecoder not initialised) ───────────
app.ad.enabled=false
app.ad.jwks-uri=
app.ad.issuer=
app.ad.audience=
app.ad.unmapped-group-strategy=DEFAULT
app.ad.default-group-name=RETAIL_CUSTOMER
app.ad.ldap.url=
app.ad.ldap.base=
app.ad.ldap.user-dn=
app.ad.ldap.password=

# ── Auto-configuration exclusions for test context ────────────────────────────
# Reactive Redis auto-configuration expects a ReactiveRedisConnectionFactory which
# conflicts with the @MockitoBean RedisConnectionFactory used in AuthApplicationTests.
spring.autoconfigure.exclude=org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration
