spring.application.name=auth

# PGSQL JDBC
spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
 # DB Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA / SQL logging (format_sql makes multi-line SQL readable in logs)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Actuator — expose health probes for Kubernetes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Mail — override via environment variables in production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@shop.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP settings
app.otp.expiry-minutes=10
app.otp.max-attempts=3
app.otp.max-resends-per-hour=3

# AWS — override in production; LocalStack defaults for local development
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}
cloud.aws.endpoint=${AWS_ENDPOINT:http://localhost:4566}

# SQS / SES — OTP email async delivery
app.messaging.otp-email-queue-url=${OTP_EMAIL_QUEUE_URL:http://localhost:4566/000000000000/otp-email-queue}
app.messaging.ses-sender-email=${SES_SENDER_EMAIL:noreply@shop.com}
app.messaging.consumer.enabled=${MESSAGING_CONSUMER_ENABLED:true}

# Redis — token blacklist + OTP rate limiting
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# CORS — comma-separated list of allowed origins; never use * in production
# Override via CORS_ALLOWED_ORIGINS env var per environment
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# Password reset — override base URL and TTL per environment
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:3000/reset-password}
app.password-reset.token-ttl-minutes=15

# Password policy (PCI-DSS 8.3.6 / NIST 800-63B)
app.security.password.history-count=12
app.security.password.max-age-days=90

# JWT — override secret via JWT_SECRET env var in production; must be >= 256 bits
app.jwt.secret=${JWT_SECRET:MyVeryLongAndSecureJwtSecretKeyThatIsAtLeast256BitsLongForDevOnly}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── Azure AD / OIDC login ──────────────────────────────────────────────────────
# Set app.ad.enabled=true and fill in tenant-specific values when deploying to
# an environment with Azure AD.  In local dev, point to Keycloak instead.
app.ad.enabled=${AD_ENABLED:false}
# Azure AD: https://login.microsoftonline.com/{tenantId}/discovery/v2.0/keys
# Keycloak:  http://localhost:8180/realms/corporate/protocol/openid-connect/certs
app.ad.jwks-uri=${AD_JWKS_URI:http://localhost:8180/realms/corporate/protocol/openid-connect/certs}
# Azure AD: https://login.microsoftonline.com/{tenantId}/v2.0
# Keycloak:  http://localhost:8180/realms/corporate
app.ad.issuer=${AD_ISSUER:http://localhost:8180/realms/corporate}
# Your Azure AD application (client) ID / Keycloak client ID
app.ad.audience=${AD_AUDIENCE:fp-auth-client}
# How to handle AD groups with no local mapping: AUTO_CREATE | DEFAULT | SKIP
app.ad.unmapped-group-strategy=${AD_UNMAPPED_GROUP_STRATEGY:DEFAULT}
app.ad.default-group-name=${AD_DEFAULT_GROUP_NAME:RETAIL_CUSTOMER}

# LDAP group sync (blank = disabled)
app.ad.ldap.url=${AD_LDAP_URL:ldap://localhost:389}
app.ad.ldap.base=${AD_LDAP_BASE:dc=corp,dc=example,dc=com}
app.ad.ldap.user-dn=${AD_LDAP_USER_DN:cn=svc-ldap,ou=service,dc=corp,dc=example,dc=com}
app.ad.ldap.password=${AD_LDAP_PASSWORD:}
app.ad.ldap.group-search-base=${AD_LDAP_GROUP_SEARCH_BASE:ou=groups,dc=corp,dc=example,dc=com}
app.ad.ldap.group-search-filter=${AD_LDAP_GROUP_SEARCH_FILTER:(member={0})}
app.ad.ldap.group-id-attribute=${AD_LDAP_GROUP_ID_ATTR:cn}
app.ad.ldap.group-name-attribute=${AD_LDAP_GROUP_NAME_ATTR:cn}
app.ad.ldap.user-search-base=${AD_LDAP_USER_SEARCH_BASE:ou=users,dc=corp,dc=example,dc=com}
app.ad.ldap.user-search-filter=${AD_LDAP_USER_SEARCH_FILTER:(mail={0})}

# Logging levels (logback-spring.xml handles structured output)
logging.level.com.shop.auth=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE